<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerenciador Alviverde Dinâmico</title>
    <style>
        :root {
            --palmeiras-verde: #006437;
            --palmeiras-accent: #06aa48;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        /* Container para a animação do fundo */
        .bg-wrapper {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -1;
            background: url('https://jpimg.com.br/uploads/2023/04/conheca-a-historia-do-palmeiras-no-campeonato-brasileiro.jpg') no-repeat center center;
            background-size: cover;
            /* Animação nos eixos X e Y */
            animation: moveBackground 20s linear infinite alternate;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -5%); }
            100% { transform: translate(5%, 2%); }
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden; /* Evita scroll por causa da animação do fundo */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }

        h2 {
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .btn-add {
            background: var(--palmeiras-verde);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; text-align: left; }

        li {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            color: white;
        }

        .done { text-decoration: line-through; opacity: 0.5; }

        input[type="checkbox"] {
            width: 22px; height: 22px; margin-right: 15px;
            accent-color: var(--palmeiras-accent);
        }

        .balloon {
            position: absolute; width: 8px; height: 8px;
            background: #fff; border-radius: 50%;
            pointer-events: none; animation: float 0.7s forwards;
        }

        @keyframes float { 100% { transform: translateY(-70px); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-wrapper"></div>

<div class="glass-card">
    <h2>Gerenciador de Tarefas</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Próxima meta do Verdão...">
        <button class="btn-add" onclick="addTask(event)">+</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('palmeirasDynamicTasks')) || [];
        saved.forEach(t => renderTask(t.text, t.done));
    };

    function save() {
        const tasks = Array.from(document.querySelectorAll('li')).map(li => ({
            text: li.querySelector('span').innerText,
            done: li.querySelector('input').checked
        }));
        localStorage.setItem('palmeirasDynamicTasks', JSON.stringify(tasks));
    }

    function pop(x, y) {
        for(let i=0; i<5; i++){
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = x + (Math.random()*16 - 8) + 'px';
            b.style.top = y + 'px';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 700);
        }
    }

    function renderTask(text, done = false) {
        const li = document.createElement('li');
        if(done) li.className = 'done';
        li.innerHTML = `
            <input type="checkbox" ${done ? 'checked' : ''} onchange="toggle(this, event)">
            <span>${text}</span>
        `;
        taskList.appendChild(li);
    }

    function addTask(e) {
        if(taskInput.value.trim()){
            pop(e.clientX, e.clientY);
            renderTask(taskInput.value);
            save();
            taskInput.value = "";
        }
    }

    function toggle(check, e) {
        if(check.checked) pop(e.clientX, e.clientY);
        check.parentElement.classList.toggle('done');
        save();
    }
</script>
</body>
</html>
